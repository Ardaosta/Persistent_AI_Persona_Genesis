[project]
name = "genesis-core"
version = "0.0.1"
description = "Genesis core: config resolution, the unified `genesis` CLI, and (next) the agentic turn-loop that doubles as the self-installer."
requires-python = ">=3.9"
dependencies = ["genesis-memory", "genesis-backend"]

[project.scripts]
genesis = "genesis_core.cli:main"

[tool.uv.sources]
genesis-memory = { path = "../genesis-memory", editable = true }
genesis-backend = { path = "../genesis-backend", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/genesis_core"]
